<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Главный Экран — Тайный Вечер</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #140d07 0%, #030202 100%);
      color: #f5f5f7;
      font-family: 'Montserrat', sans-serif;
    }

    /* Фоновый холст - звезды, золотая пыль */
    #bg-matrix-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.75;
    }

    /* ================= ВЕЛИКОЛЕПНЫЕ ГОЛОГРАММЫ ================= */
    
    /* Голографическая крепость */
    .hologram-fortress {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      height: 38%;
      background: url('крепость.png') no-repeat center bottom;
      background-size: contain;
      z-index: 2;
      opacity: 0.28;
      filter: drop-shadow(0 0 35px rgba(212, 175, 55, 0.5)) sepia(1) saturate(4) brightness(0.95);
      mix-blend-mode: screen;
      pointer-events: none;
      animation: fortressBreathing 10s infinite ease-in-out;
    }

    @keyframes fortressBreathing {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 0.24; }
      50% { transform: translateX(-50%) translateY(-10px) scale(1.012); opacity: 0.32; }
    }

    /* Голограмма Петра Великого */
    .hologram-peter {
      position: absolute;
      top: 10%;
      right: 4%;
      width: 320px;
      height: 400px;
      background: url('петр.png') no-repeat center;
      background-size: contain;
      z-index: 2;
      opacity: 0.2;
      filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.45)) sepia(1) saturate(1.8) brightness(0.95);
      mix-blend-mode: screen;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out;
      animation: peterBreathing 11s infinite ease-in-out;
    }

    @keyframes peterBreathing {
      0%, 100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.18; }
      50% { transform: translateY(-12px) scale(1.02) rotate(0.4deg); opacity: 0.24; }
    }

    /* Волны Невы у самого низа экрана */
    .parallax-wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 180px;
      background: url('волны.png') repeat-x center bottom;
      background-size: 50% 100%;
      z-index: 10;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .wave-back {
      animation: waveMoveBack 45s linear infinite;
      filter: sepia(1) saturate(6) hue-rotate(330deg) brightness(0.18);
      bottom: 15px;
      opacity: 0.18;
    }

    .wave-front {
      animation: waveMoveFront 25s linear infinite;
      filter: sepia(1) saturate(8) hue-rotate(345deg) brightness(0.32);
      bottom: 0;
      opacity: 0.35;
    }

    @keyframes waveMoveBack {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes waveMoveFront {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    /* Контейнер HUD */
    .screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 25px 50px;
      box-shadow: inset 0 0 200px rgba(0,0,0,0.96);
    }

    /* Логотип по центру сверху */
    .stage-logo {
      height: 90px;
      margin-bottom: 15px;
      filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.8));
      z-index: 12;
      animation: logoFloat 7s infinite ease-in-out;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(0.6deg); }
    }

    /* ================= ФИРМЕННЫЙ КИБЕР-БАРОЧНЫЙ СВИТОК ================= */
    .parchment-scroll-container {
      width: 82%;
      max-width: 1100px;
      background: linear-gradient(135deg, rgba(22, 16, 11, 0.85) 0%, rgba(10, 8, 5, 0.94) 100%);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 2px solid rgba(255, 215, 0, 0.45);
      border-radius: 16px;
      padding: 35px 50px;
      box-shadow: 
        0 25px 60px rgba(0,0,0,0.95), 
        0 0 40px rgba(212, 175, 55, 0.25), 
        inset 0 0 30px rgba(255, 215, 0, 0.04);
      position: relative;
      margin-top: 10px;
      opacity: 0;
      transform: translateY(-30px) scale(0.97);
      transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
      display: none;
      z-index: 15;
    }

    .parchment-scroll-container.active {
      display: block;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Угловой светящийся декор */
    .scroll-corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 2px solid rgba(212, 175, 55, 0.8);
      pointer-events: none;
      filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.6));
    }
    .sc-tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
    .sc-tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
    .sc-bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
    .sc-br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

    /* Бегущая световая полоса по рамке свитка */
    .parchment-scroll-container::after {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 16px;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.55), transparent);
      z-index: -1;
      animation: frameLightSweep 5s linear infinite;
      background-size: 200% 100%;
    }

    @keyframes frameLightSweep {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Медальон с номером раунда */
    .round-num-tag {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #ffd700 0%, #a17c18 100%);
      border: 2px solid #ffd700;
      padding: 6px 36px;
      border-radius: 25px;
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: #0c0a07;
      font-weight: 900;
      box-shadow: 0 5px 12px rgba(0,0,0,0.65), 0 0 12px rgba(255, 215, 0, 0.5);
      letter-spacing: 1px;
    }

    .question-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: #ffd700;
      text-align: center;
      line-height: 1.45;
      margin-top: 15px;
      margin-bottom: 25px;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.35), 0 4px 8px rgba(0,0,0,0.9);
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .option-card {
      background: rgba(26, 20, 13, 0.85);
      border: 1.5px solid rgba(212, 175, 55, 0.35);
      border-radius: 12px;
      padding: 20px 24px;
      font-size: 20px;
      font-weight: 600;
      color: #fcf6e8;
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      box-shadow: 0 6px 15px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }

    .option-card.correct {
      background: rgba(0, 230, 118, 0.18) !important;
      border-color: #00e676 !important;
      color: #00e676 !important;
      box-shadow: 0 0 25px rgba(0, 230, 118, 0.6), inset 0 0 15px rgba(0, 230, 118, 0.15);
      transform: scale(1.025);
    }

    .option-card.correct::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 230, 118, 0.35), transparent);
      transform: skewX(-25deg);
      animation: correctSweep 1.8s infinite ease-out;
    }

    @keyframes correctSweep {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    .option-card.incorrect {
      opacity: 0.15;
      transform: scale(0.97);
    }

    /* ================= АСТРОЛЯБИЯ / Spinning Clock Timer ================= */
    .timer-container {
      position: relative;
      margin: 10px auto;
      width: 110px;
      height: 110px;
      z-index: 20;
      display: flex !important;
      opacity: 0;
      pointer-events: none;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease-in-out;
      flex-shrink: 0;
    }
    .timer-container.active {
      opacity: 1;
      pointer-events: auto;
    }

    .astrolabe-gears {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.55;
    }

    .gear-main {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 90px;
      height: 90px;
      stroke: #d4af37;
      stroke-width: 1.2;
      fill: none;
      animation: spinClockwise 18s linear infinite;
    }

    .gear-secondary {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 44px;
      height: 44px;
      stroke: #ffd700;
      stroke-width: 1;
      fill: none;
      animation: spinCounterClockwise 10s linear infinite;
    }

    .gear-third {
      position: absolute;
      bottom: 3px;
      left: 3px;
      width: 36px;
      height: 36px;
      stroke: #a17c18;
      stroke-width: 0.8;
      fill: none;
      animation: spinClockwise 6s linear infinite;
    }

    @keyframes spinClockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinCounterClockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    .timer-svg {
      width: 120px;
      height: 120px;
      transform: rotate(-90deg);
    }

    .timer-bg-circle {
      fill: none;
      stroke: rgba(212, 175, 55, 0.15);
      stroke-width: 6;
    }

    .timer-progress-circle {
      fill: none;
      stroke: #ffd700;
      stroke-width: 6;
      stroke-dasharray: 345;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.1s linear;
      filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.95));
    }

    .timer-text {
      position: absolute;
      font-family: 'Cinzel', serif;
      font-size: 38px;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.75);
    }

    .timer-text.pulse-critical {
      color: #ef4444;
      animation: textStrobe 0.5s infinite alternate;
    }

    @keyframes textStrobe {
      from { transform: scale(1); text-shadow: 0 0 10px #ef4444; }
      to { transform: scale(1.15); text-shadow: 0 0 22px #ef4444; }
    }

    /* ================= СТЕНДБАИ СПЛЭШ ================= */
    .standby-splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      z-index: 10;
      margin-top: 40px;
    }

    .standby-splash h2 {
      font-family: 'Cinzel', serif;
      font-size: 72px;
      color: #ffd700;
      letter-spacing: 4px;
      text-shadow: 0 0 45px rgba(255, 215, 0, 0.7);
      margin-bottom: 15px;
      animation: textGlowPulse 4s infinite ease-in-out;
    }

    @keyframes textGlowPulse {
      0%, 100% { text-shadow: 0 0 25px rgba(255, 215, 0, 0.5); }
      50% { text-shadow: 0 0 55px rgba(255, 215, 0, 0.9); }
    }

    /* ================= СТАБИЛЬНЫЙ ЛИДЕРБОРД "МОРСКАЯ ГАВАНЬ" ================= */
    .leaderboard-race-container {
      position: absolute;
      bottom: 50px;
      left: 6%;
      right: 6%;
      height: 48%;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      pointer-events: none;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .leaderboard-race-container.active {
      opacity: 1;
      transform: translateY(0);
    }

    .race-lane {
      width: 100%;
      height: 42px;
      position: relative;
      background: linear-gradient(90deg, rgba(255, 215, 0, 0) 0%, rgba(255, 215, 0, 0.05) 30%, rgba(255, 215, 0, 0.05) 70%, rgba(255, 215, 0, 0) 100%);
      border-bottom: 2px solid rgba(255, 215, 0, 0.25);
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.04);
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .race-lane::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent 40%, rgba(255, 215, 0, 0.12) 50%, transparent 60%);
      background-size: 300px 100%;
      animation: laneWaveRipple 6s linear infinite;
    }

    @keyframes laneWaveRipple {
      0% { background-position: -300px 0; }
      100% { background-position: 300px 0; }
    }

    .lane-label {
      position: absolute;
      left: -48px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Cinzel', serif;
      font-size: 14px;
      color: #ffd700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    /* Фрегаты */
    .frigate-ship {
      position: absolute;
      left: 10%;
      bottom: -4px;
      width: 65px;
      height: 65px;
      transition: left 2.5s cubic-bezier(0.2, 0.8, 0.25, 1);
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.9));
      animation: shipFloatPhysics 4s infinite ease-in-out;
      transform-origin: bottom center;
    }

    @keyframes shipFloatPhysics {
      0%, 100% { transform: translateY(0) rotate(2.5deg); }
      50% { transform: translateY(-4px) rotate(-2.5deg); }
    }

    /* Вертикальный световой луч у корабля-лидера */
    .frigate-ship.leader::after {
      content: '';
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 600px;
      background: linear-gradient(0deg, rgba(255, 215, 0, 0.75) 0%, rgba(255, 215, 0, 0.15) 60%, transparent 100%);
      filter: blur(3px);
      z-index: -1;
      animation: beamFlicker 1.8s infinite ease-in-out;
    }

    @keyframes beamFlicker {
      0%, 100% { opacity: 0.9; width: 8px; }
      50% { opacity: 0.5; width: 11px; }
    }

    .ship-3d-label {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 900;
      color: #ffd700;
      background: rgba(15, 12, 9, 0.95);
      border: 1px solid #d4af37;
      padding: 1px 6px;
      border-radius: 3px;
      white-space: nowrap;
      box-shadow: 0 2px 5px rgba(0,0,0,0.7);
    }

    /* Брызги под кораблем */
    .gulf-wake-particle {
      position: absolute;
      bottom: 2px;
      left: -12px;
      width: 6px;
      height: 6px;
      background: rgba(255, 215, 0, 0.7);
      border-radius: 50%;
      filter: blur(0.5px) drop-shadow(0 0 4px #ffd700);
      animation: wakeFlow 1.2s infinite ease-out;
    }

    @keyframes wakeFlow {
      0% { transform: scale(1) translateX(0) translateY(0); opacity: 0.8; }
      100% { transform: scale(0) translateX(-30px) translateY(-3px); opacity: 0; }
    }

    /* ================= НЕЙРО-СКАН (РАУНД 2: HIGHTECH) ================= */
    .laser-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 25;
      pointer-events: none;
      display: none;
      background: rgba(0, 230, 118, 0.04);
    }

    .laser-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 4px;
      background: #00e676;
      box-shadow: 0 0 25px #00e676, 0 0 45px #00e676;
      animation: laserSweep 3.5s infinite ease-in-out;
      opacity: 0.95;
    }

    @keyframes laserSweep {
      0%, 100% { top: 5%; }
      50% { top: 95%; }
    }

    .laser-reticle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 380px;
      height: 380px;
      border: 2px dashed rgba(0, 230, 118, 0.35);
      border-radius: 50%;
      animation: spinClockwise 20s linear infinite;
    }
    .laser-reticle::before {
      content: "";
      position: absolute;
      top: 20px; left: 20px; right: 20px; bottom: 20px;
      border: 1px solid rgba(0, 230, 118, 0.15);
      border-radius: 50%;
      border-left: 3px solid #00e676;
      border-right: 3px solid #00e676;
      animation: spinCounterClockwise 8s linear infinite;
    }

    .holographic-scan-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 600px;
      background: rgba(4, 12, 8, 0.97);
      border: 3px solid #00e676;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      color: #00e676;
      font-family: 'Cinzel', serif;
      z-index: 26;
      opacity: 0;
      box-shadow: 0 0 55px rgba(0, 230, 118, 0.6), inset 0 0 25px rgba(0, 230, 118, 0.25);
      transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .holographic-scan-card.active {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .match-percent-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px dashed #00e676;
      border-top-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      font-weight: 900;
      margin: 25px auto;
      text-shadow: 0 0 18px rgba(0, 230, 118, 0.85);
    }

    /* ================= ГРАНД-ФИНАЛ: ВОРОТА ================= */
    .gate-curtain-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      pointer-events: none;
      perspective: 2000px;
      display: none;
    }

    .gate-door {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(135deg, #1f180f 0%, #060504 100%);
      border: 10px solid #d4af37;
      box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.95);
      transition: transform 4.5s cubic-bezier(0.4, 0, 0.1, 1);
      transform-style: preserve-3d;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gate-left {
      left: 0;
      transform-origin: left center;
      border-right: 5px solid #ffd700;
    }

    .gate-right {
      right: 0;
      transform-origin: right center;
      border-left: 5px solid #ffd700;
    }

    .gate-grille-decor {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(212, 175, 55, 0.15);
      background-image: 
        radial-gradient(circle, transparent 30%, rgba(212, 175, 55, 0.02) 31%),
        linear-gradient(45deg, rgba(212, 175, 55, 0.02) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(212, 175, 55, 0.02) 25%, transparent 25%);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .gate-relief {
      width: 60%;
      max-width: 280px;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.95)) sepia(0.2) saturate(1.8);
      position: relative;
      z-index: 2;
    }

    .victory-reveal-stage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(255, 215, 0, 0.45) 0%, rgba(2,2,4,1) 75%);
      z-index: 49;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    /* Световые лучи прожекторов на сцене победы */
    .victory-reveal-stage::before, .victory-reveal-stage::after {
      content: '';
      position: absolute;
      top: -20%;
      width: 150px;
      height: 140%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.15), transparent);
      transform-origin: top center;
      animation: searchlightLeft 8s infinite alternate ease-in-out;
      z-index: 1;
    }
    .victory-reveal-stage::after {
      animation: searchlightRight 9s infinite alternate ease-in-out;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.12), transparent);
    }
    @keyframes searchlightLeft {
      0% { transform: rotate(-25deg); }
      100% { transform: rotate(15deg); }
    }
    @keyframes searchlightRight {
      0% { transform: rotate(20deg); }
      100% { transform: rotate(-20deg); }
    }

    .victory-standard {
      width: 220px;
      height: 220px;
      filter: drop-shadow(0 0 40px rgba(255,215,0,0.9));
      animation: victoryFloat 4s infinite ease-in-out;
      z-index: 2;
    }

    @keyframes victoryFloat {
      0%, 100% { transform: translateY(0); }

<body>

    <!-- ================= СТЕНДБАЙ-ЭКРАН ================= -->
    <div class="standby-splash" id="screen-standby-splash">
      <img src="название.png" alt="Тайный Вечер" style="max-height: 250px; margin-bottom: 30px; filter: drop-shadow(0 0 45px rgba(255, 215, 0, 0.6));">
      <p style="font-family: 'Playfair Display', serif; font-size: 32px; font-style: italic; color: #ffd700; letter-spacing: 1px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.45); text-transform: uppercase;">

    <!-- ================= СВИТОК С ВОПРОСОМ ================= -->

      <!-- Портрет для Раунда 1 -->

      <div class="scroll-corner sc-br"></div>
      
      <h2 style="font-family: 'Cinzel', serif; font-size: 38px; color: #ffd700; text-align: center; margin-bottom: 25px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); letter-spacing: 1px;">
        ⚜ ТУРНИРНАЯ ТАБЛИЦА АССАМБЛЕИ ⚜
      </h2>
      
      <div class="leaderboard-table-container" id="leaderboard-table-rows">
        <!-- Строки будут добавлены JS -->

  <!-- ================= НЕЙРО-СКАН (РАУНД 2) ================= -->
  <div class="laser-overlay" id="screen-laser-box">
    <div class="laser-line"></div>
    <div class="laser-reticle"></div>
    <div class="holographic-scan-card" id="screen-scan-card">
      <h2>НЕЙРО-СКАНИРОВАНИЕ ЖИВОПИСИ</h2>
      <p style="color: #00e676; margin-top: 10px; font-size: 18px;" id="scan-card-table-name">СТОЛ №—</p>
      <div class="match-percent-circle" id="scan-card-similarity">
        <span style="font-size:12px; font-weight:400; color:rgba(0,230,118,0.5); letter-spacing:1px; margin-bottom:5px;">MATCH</span>
        98%
      </div>
      <p style="font-size: 15px; font-style: italic; color: rgba(0, 230, 118, 0.85);">
        Императорское художественное соответствие подтверждено!
      </p>
    </div>
  </div>

  <!-- ================= ГРАНД-ФИНАЛ: ВОРОТА ================= -->
  <div class="gate-curtain-overlay" id="screen-gates-overlay">
    <video id="screen-gates-video" src="Victory_Gates_Open.mp4" style="position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; display: none; z-index: 10;"></video>
    <div class="gate-door gate-left">
      <div class="gate-grille-decor"></div>
      <img src="royal_crown.svg" alt="Рельеф" class="gate-relief" style="transform: rotate(5deg) scale(0.9); margin-left: auto; margin-right: 15px;">
    </div>

      <div class="gate-grille-decor"></div>
      <img src="royal_crown.svg" alt="Рельеф" class="gate-relief" style="transform: scaleX(-1) rotate(5deg) scale(0.9); margin-right: auto; margin-left: 15px;">
    </div>
  </div>

  <!-- Победитель за воротами -->
  <div class="victory-reveal-stage" id="screen-victory-stage">
    <img src="royal_crown.svg" alt="Штандарт" class="victory-standard">
    <h1 style="font-size: 72px; color: #ffd700; margin-top: 30px; letter-spacing: 3px; font-family: 'Cinzel', serif;">
      ПОБЕДИТЕЛЬ АССАМБЛЕИ
    </h1>
    <h2 style="font-size: 56px; color: #f0f0f0; margin-top: 10px; font-family: 'Cinzel', serif; letter-spacing:1px;" id="victory-table-winner">СТОЛ №3</h2>
    <p style="font-family: 'Playfair Display', serif; font-size: 28px; font-style: italic; color: #d4af37; margin-top: 25px;">
      Жалуем победителю звание Тайного Советника Ассамблеи!
    </p>
  </div>

  <script>
    // --- ПОДКЛЮЧЕНИЕ SUPABASE ---
    const _sb = window.sb;
    let TABLE_NAMES = {
      1: "Императорский", 2: "Земли Центральные", 3: "Боярский союз",
      4: "Купеческая гильдия", 5: "Академия наук", 6: "Адмиралтейский приказ",
      7: "Посольская миссия", 8: "Царская канцелярия", 9: "Сенатские палаты", 10: "Архитекторы IT"
    };

    let tableScores = {};
    let activeTimerLimit = 5;
    let currentRound = 0;

    // Хелпер для маппинга полей базы в camelCase
    function mapState(dbState) {
      return {
        currentRound: dbState.current_round,
        roundStep: dbState.round_step,
        subQuestionIndex: dbState.sub_question_index,
        timerLimit: dbState.timer_limit,
        timerRemaining: dbState.timer_remaining,
        correctAnswer: dbState.correct_answer,
        activeQuestion: dbState.active_question,
        laserMode: dbState.laser_mode
      };
    }

    async function initScreen() {
      console.log('Экран успешно инициализировал подключение к Supabase');
      renderLeaderboardLanes();

      // Загрузить начальное состояние квиза
      const { data: stateData } = await _sb.from('quiz_state').select('*').eq('id', 1).single();
      if (stateData) {
        currentRound = stateData.current_round;
        activeTimerLimit = stateData.timer_limit || 5;
        handleStateChange(mapState(stateData));
      }

      // Загрузить начальные счета
      const { data: scoresData } = await _sb.from('quiz_scores').select('*');
      if (scoresData) {
        scoresData.forEach(r => {
          tableScores[r.table_number] = r.score;
        });
        updateShipsPositions();
      }

      // Подписка на Realtime обновление состояния квиза
      _sb.channel('screen-quiz-state')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'quiz_state' }, (payload) => {
          const state = payload.new;
          console.log('Realtime state update:', state);

          // Проверяем эффект лазера
          if (state.laser_mode && state.laser_mode !== 'none') {
            const parts = state.laser_mode.split('_');
            if (parts[0] === 'table' && parts[1] && parts[2]) {
              triggerLaserEffect(parseInt(parts[1], 10), parseInt(parts[2], 10));
            }
          }

          currentRound = state.current_round;
          handleStateChange(mapState(state));

          // Обновление таймера
          if (state.round_step === 'answers_active') {
            activeTimerLimit = state.timer_limit || 30;
            updateTimerTick(state.timer_remaining);
          } else {
            resetTimerUI();
          }
        })
        .subscribe();

      // Подписка на Realtime обновление очков
      _sb.channel('screen-quiz-scores')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'quiz_scores' }, async () => {
          const { data } = await _sb.from('quiz_scores').select('*');
          if (data) {
            tableScores = {};
            data.forEach(r => { tableScores[r.table_number] = r.score; });
            updateShipsPositions();
          }
        })
        .subscribe();
    }

    function updateTimerTick(rem) {
      const circle = document.getElementById('timer-circle');
      const text = document.getElementById('timer-number');
      if (text) text.textContent = rem;

      if (circle) {
        const perimeter = 2 * Math.PI * 55; // 345
        const progress = rem / activeTimerLimit;
        circle.style.strokeDashoffset = perimeter * (1 - progress);
      }

      if (rem <= 2) {
        text.classList.add('pulse-critical');
      } else {
        text.classList.remove('pulse-critical');
      }
    }

    function resetTimerUI() {
      const circle = document.getElementById('timer-circle');
      const text = document.getElementById('timer-number');
      if (text) {
        text.textContent = "0";
        text.classList.remove('pulse-critical');
      }
      if (circle) circle.style.strokeDashoffset = 345;
    }

    function triggerLaserEffect(tableNumber, similarity) {
      const laserOverlay = document.getElementById('screen-laser-box');
      const scanCard = document.getElementById('screen-scan-card');
      const nameLabel = document.getElementById('scan-card-table-name');
      const simLabel = document.getElementById('scan-card-similarity');

      laserOverlay.style.display = 'block';
      const tblNameText = TABLE_NAMES[tableNumber] || `Стол №${tableNumber}`;
      nameLabel.textContent = `СТОЛ №${tableNumber} (${tblNameText})`;
      simLabel.innerHTML = `<span style="font-size:12px; font-weight:400; color:rgba(0,230,118,0.5); letter-spacing:1px; margin-bottom:5px;">MATCH</span>${similarity}%`;
      simLabel.style.display = 'flex';
      const descLabel = scanCard.querySelector('p:last-of-type');
      if (descLabel) descLabel.style.display = 'block';
      
      setTimeout(() => {
        scanCard.classList.add('active');
      }, 500);

      setTimeout(() => {
        scanCard.classList.remove('active');
        setTimeout(() => {
          if (currentRound === 2) {
            nameLabel.innerHTML = `<span style="color: #00e676; font-size: 24px; letter-spacing: 2px;">ИДЕТ НЕЙРО-СКАНИРОВАНИЕ</span>`;
            simLabel.style.display = 'none';
            if (descLabel) descLabel.style.display = 'none';
          } else {
            laserOverlay.style.display = 'none';
          }
        }, 600);
      }, 5000);
    }

    initScreen();

    function renderLeaderboardLanes() {
      const leaderboardBox = document.getElementById('screen-leaderboard');
      if (!leaderboardBox) return;
      leaderboardBox.innerHTML = '';

      const sortedKeys = Object.keys(TABLE_NAMES).sort((a, b) => parseInt(a) - parseInt(b));
      const count = sortedKeys.length;

      sortedKeys.forEach((key, idx) => {
        const lane = document.createElement('div');
        lane.className = 'race-lane';
        lane.id = `race-lane-${key}`;
        
        const scaleVal = (0.76 + idx * (0.24 / Math.max(count - 1, 1))).toFixed(3);
        const opacityVal = (0.55 + idx * (0.45 / Math.max(count - 1, 1))).toFixed(2);
        
        lane.style.transform = `scale(${scaleVal})`;
        lane.style.opacity = opacityVal;
        
        const label = document.createElement('span');
        label.className = 'lane-label';
        label.textContent = TABLE_NAMES[key];
        lane.appendChild(label);

        // Создаем фрегат
        const ship = document.createElement('div');
        ship.className = 'frigate-ship';
        ship.id = `frigate-${key}`;
        ship.style.left = '10%'; // Стартовая позиция

        ship.innerHTML = `
          <div class="ship-3d-label">${TABLE_NAMES[key]}</div>
          <svg viewBox="0 0 100 100" style="width: 100%; height: 100%; fill: #ffd700;">
            <path d="M 12 58 L 88 58 C 84 78, 20 78, 12 58 Z" fill="#5c3f1a" stroke="#ffd700" stroke-width="1.8"/>
            <path d="M 88 58 L 97 50 L 90 56 Z" fill="#ffd700"/>
            <line x1="32" y1="58" x2="32" y2="12" stroke="#ffd700" stroke-width="2.5"/>
            <line x1="55" y1="58" x2="55" y2="5" stroke="#ffd700" stroke-width="2.8"/>
            <line x1="78" y1="58" x2="78" y2="18" stroke="#ffd700" stroke-width="2.5"/>
            <line x1="86" y1="58" x2="98" y2="42" stroke="#ffd700" stroke-width="1.8"/>
            <path d="M 32 18 Q 12 28, 32 37 Z" fill="#fffaef" stroke="#c49a2a" stroke-width="0.8"/>
            <path d="M 32 37 Q 15 45, 32 54 Z" fill="#fffaef" stroke="#c49a2a" stroke-width="0.8"/>
            <path d="M 55 12 Q 25 22, 55 32 Z" fill="#fffaef" stroke="#c49a2a" stroke-width="0.8"/>
            <path d="M 55 32 Q 22 42, 55 54 Z" fill="#fffaef" stroke="#c49a2a" stroke-width="1"/>
            <path d="M 78 22 Q 62 28, 78 36 Z" fill="#fffaef" stroke="#c49a2a" stroke-width="0.8"/>
            <path d="M 78 36 Q 64 44, 78 52 Z" fill="#fffaef" stroke="#c49a2a" stroke-width="0.8"/>
            <path d="M 78 27 Q 88 37, 86 46 Z" fill="#fffaef" stroke="#c49a2a"/>
            <polygon points="32,12 42,15 32,18" fill="#ffd700"/>
            <polygon points="55,5 68,9 55,13" fill="#ef4444"/>
            <polygon points="78,18 85,20 78,22" fill="#ffd700"/>
          </svg>
          <div class="gulf-wake-particle"></div>
          <div class="gulf-wake-particle" style="animation-delay: 0.4s;"></div>
          <div class="gulf-wake-particle" style="animation-delay: 0.8s;"></div>
        `;
        
        lane.appendChild(ship);
        leaderboardBox.appendChild(lane);
      });
    }

    function handleStateChange(state) {
      const round = state.currentRound;
      const step = state.roundStep;

      // Автоматически скрываем полноэкранную таблицу при активных игровых шагах
      if (step === 'question' || step === 'answers_active') {
        showFullscreenLeaderboard(false);
      } else if (step === 'standby' && round > 0) {
        showFullscreenLeaderboard(true); // Показываем между раундами
      }

      // Настройка видимости голограммы Петра (ярче во время Standby/результатов)
      const peterHolo = document.getElementById('screen-hologram-peter');
      if (peterHolo) {
        peterHolo.style.opacity = (round === 0 || step === 'standby' || step === 'correct_answer') ? '0.18' : '0.03';
      }

      const logo = document.querySelector('.stage-logo');
      const standbySplash = document.getElementById('screen-standby-splash');
      const questionScroll = document.getElementById('screen-parchment-scroll');
      const timerBox = document.getElementById('timer-box');
      const leaderboard = document.getElementById('screen-leaderboard');
      const gates = document.getElementById('screen-gates-overlay');
      const victoryStage = document.getElementById('screen-victory-stage');
      const portraitBox = document.getElementById('screen-portrait-box');

      if (round === 0) {
        if (logo) logo.style.display = 'none'; // Скрываем верхнюю мелкую корону на заставке
        standbySplash.style.display = 'flex';
        questionScroll.classList.remove('active');
        timerBox.classList.remove('active');
        leaderboard.classList.remove('active'); // Скрываем дорожки полностью
        gates.style.display = 'none';
        victoryStage.style.display = 'none';
        portraitBox.style.display = 'none';
        return;
      }

      if (logo) logo.style.display = 'block'; // Показываем мелкую корону в раундах

      // Показываем дорожки в раундах
      if (round === 7 && step === 'correct_answer') {
        leaderboard.classList.remove('active');
      } else {
        leaderboard.classList.add('active');
      }

      standbySplash.style.display = 'none';
      
      // Сбрасываем дисплеи блоков, которые могут скрываться
      const optionsBox = document.getElementById('screen-options-box');
      optionsBox.style.display = 'grid';

      if (round === 2) {
        questionScroll.classList.remove('active');
        timerBox.classList.remove('active');
        portraitBox.style.display = 'none';
        
        // Показываем общую анимацию лазера
        const laserOverlay = document.getElementById('screen-laser-box');
        const scanCard = document.getElementById('screen-scan-card');
        const nameLabel = document.getElementById('scan-card-table-name');
        const simLabel = document.getElementById('scan-card-similarity');
        const descLabel = scanCard.querySelector('p:last-of-type');

        nameLabel.innerHTML = `<span style="color: #00e676; font-size: 24px; letter-spacing: 2.5px;">ИДЕТ НЕЙРО-СКАНИРОВАНИЕ</span>`;
        simLabel.style.display = 'none';
        if (descLabel) descLabel.style.display = 'none';

        laserOverlay.style.display = 'block';
        scanCard.classList.add('active');
        return;
      } else {
        // Убираем лазер если вышли из раунда 2
        document.getElementById('screen-laser-box').style.display = 'none';
        document.getElementById('screen-scan-card').classList.remove('active');
      }

      // Скрываем свиток вопросов в раундах 5 и 6, чтобы гости общались
      if (round === 5 || round === 6) {
        questionScroll.classList.remove('active');
      }

      // Настройка портретов в Раунде 1
      if (round === 1) {
        portraitBox.style.display = 'flex';
        document.getElementById('screen-portrait-img').src = `photo_${state.subQuestionIndex + 1}.png`; 
      } else {
        portraitBox.style.display = 'none';
      }

      // Скрываем варианты ответов на сцене для Раундов 1 и 4 (показываются только на телефонах)
      if (round === 1 || round === 4) {
        optionsBox.style.display = 'none';
      }

      if (state.activeQuestion) {
        // Показываем свиток только для раундов 1, 3, 4, 7
        if (round !== 5 && round !== 6) {
          questionScroll.classList.add('active');
        }
        
        let roundTag = `РАУНД ${round}`;
        if (round === 1) {
          roundTag = `РАУНД 1. Портрет ${state.subQuestionIndex + 1}`;
        } else if (round === 4) {
          roundTag = `БЛИЦ. Вопрос ${state.subQuestionIndex + 1}`;
        } else if (round === 5) {
          roundTag = `АЛЬЯНС. Шифровка ${state.subQuestionIndex + 1}`;
        } else if (round === 6) {
          roundTag = `ПОСЛЫ. Мем ${state.subQuestionIndex + 1}`;
        }
        document.getElementById('screen-round-tag').textContent = roundTag;
        
        let qText = state.activeQuestion.text;
        if (round === 5) {
          qText += " (Отвечают чётные столы по подсказкам нечётных!)";
        } else if (round === 6) {
          qText += " (Отвечают нечётные столы по подсказкам чётных!)";
        }
        
        document.getElementById('screen-question-text').textContent = qText;

        optionsBox.innerHTML = '';
        
        if (state.activeQuestion.options && state.activeQuestion.options.length > 0) {
          state.activeQuestion.options.forEach((opt, idx) => {
            const code = ['A', 'B', 'C', 'D'][idx];
            const div = document.createElement('div');
            div.className = 'option-card';
            div.id = `opt-card-${code}`;
            div.textContent = opt;
            optionsBox.appendChild(div);
          });
        }
      }

      if (step === 'answers_active') {
        activeTimerLimit = state.timerLimit || 30; // default 30
        timerBox.classList.add('active');
      } else {
        timerBox.classList.remove('active');
      }

      if (step === 'correct_answer') {
        timerBox.classList.remove('active');
        // Для Раундов 1 и 4 временно показываем карточки вариантов, чтобы выделить правильный ответ
        if (round === 1 || round === 4) {
          optionsBox.style.display = 'grid';
        }
        const correctCode = state.correctAnswer;
        if (correctCode) {
          document.querySelectorAll('.option-card').forEach(card => {
            if (card.id === `opt-card-${correctCode}`) {
              card.classList.add('correct');
            } else {
              card.classList.add('incorrect');
            }
          });
        }

        if (round === 7) {
          triggerGatesWinner();
        }
      }
    }

    function updateShipsPositions() {
      let maxScore = 0;
      const sortedKeys = Object.keys(TABLE_NAMES);
      if (sortedKeys.length === 0) return;

      sortedKeys.forEach(t => {
        if (tableScores[t] > maxScore) {
          maxScore = tableScores[t];
        }
      });

      const scoreDenominator = maxScore > 0 ? maxScore : 100;

      sortedKeys.forEach(key => {
        const score = tableScores[key] || 0;
        const ship = document.getElementById(`frigate-${key}`);
        if (ship) {
          const leftPercent = 10 + 75 * (score / scoreDenominator);
          ship.style.left = `${leftPercent}%`;

          // Выделяем лидера гонки
          if (score === maxScore && maxScore > 0) {
            ship.classList.add('leader');
            ship.querySelector('svg').style.filter = 'drop-shadow(0 0 16px rgba(255,215,0,0.95))';
          } else {
            ship.classList.remove('leader');
            ship.querySelector('svg').style.filter = 'drop-shadow(0 6px 10px rgba(0,0,0,0.85))';
          }
        }
      });
    }

    function triggerGatesWinner() {
      const sortedKeys = Object.keys(TABLE_NAMES);
      if (sortedKeys.length === 0) return;

      let winnerTable = sortedKeys[0];
      let maxScore = -1;
      
      sortedKeys.forEach(key => {
        const score = tableScores[key] || 0;
        if (score > maxScore) {
          maxScore = score;
          winnerTable = key;
        }
      });

      const video = document.getElementById('screen-gates-video');
      const winnerLabel = document.getElementById('victory-table-winner');
      const gates = document.getElementById('screen-gates-overlay');
      const victoryStage = document.getElementById('screen-victory-stage');

      const tblNameText = TABLE_NAMES[winnerTable] || `Стол №${winnerTable}`;
      if (winnerLabel) winnerLabel.textContent = `СТОЛ №${winnerTable} (${tblNameText})`;

      if (gates) gates.style.display = 'block';

      const leftGate = document.querySelector('.gate-left');
      const rightGate = document.querySelector('.gate-right');
      if (leftGate) leftGate.style.transform = 'rotateY(0deg)';
      if (rightGate) rightGate.style.transform = 'rotateY(0deg)';

      if (video) {
        video.style.display = 'block';
        video.currentTime = 0;
        video.play().then(() => {
          console.log('[Video] Playing Victory_Gates_Open.mp4');
          
          video.onended = () => {
            video.style.display = 'none';
            if (victoryStage) {
              victoryStage.style.display = 'flex';
              victoryStage.style.opacity = '1';
            }
          };
          
          // Резервный таймер на случай сбоя onended
          setTimeout(() => {
            if (video.style.display !== 'none') {
              video.style.display = 'none';
              if (victoryStage) {
                victoryStage.style.display = 'flex';
                victoryStage.style.opacity = '1';
              }
            }
          }, 8000);
          
        }).catch(err => {
          console.warn('[Video] Play failed, falling back to CSS gates:', err);
          video.style.display = 'none';
          runCssGatesFallback();
        });
      } else {
        runCssGatesFallback();
      }

      function runCssGatesFallback() {
        setTimeout(() => {
          if (leftGate) leftGate.style.transform = 'rotateY(-110deg)';
          if (rightGate) rightGate.style.transform = 'rotateY(110deg)';
          
          if (victoryStage) {
            victoryStage.style.display = 'flex';
            victoryStage.style.opacity = '0';
            
            let op = 0;
            const fadeInt = setInterval(() => {
              op += 0.05;
              victoryStage.style.opacity = op;
              if (op >= 1) clearInterval(fadeInt);
            }, 80);
          }

        }, 1000);
      }
    }

    function showFullscreenLeaderboard(show) {
      const overlay = document.getElementById('screen-fullscreen-leaderboard');
      if (!overlay) return;
      
      if (show) {
        const rowsContainer = document.getElementById('leaderboard-table-rows');
        if (rowsContainer) {
          rowsContainer.innerHTML = '';
          
          const sortedTables = Object.keys(TABLE_NAMES).map(key => ({
            key: key,
            name: TABLE_NAMES[key],
            score: tableScores[key] || 0
          })).sort((a, b) => b.score - a.score);
          
          sortedTables.forEach((item, idx) => {
            const rank = idx + 1;
            const row = document.createElement('div');
            row.className = `leaderboard-row rank-${rank}`;
            
            // Назначаем красивые значки медалей для первых трех мест
            let medal = rank;
            if (rank === 1) medal = '<img src="royal_crown.svg" style="height: 24px; vertical-align: middle;">';
            else if (rank === 2) medal = '🛡️';
            else if (rank === 3) medal = '⭐';
            
            row.innerHTML = `
              <div class="rank-badge">${medal}</div>
              <div class="leaderboard-table-name">СТОЛ №${item.key} (${item.name})</div>
              <div class="leaderboard-score-val">${item.score} монет</div>
            `;
            rowsContainer.appendChild(row);
          });
        }
        overlay.style.display = 'flex';
        setTimeout(() => {
          overlay.classList.add('active');
        }, 50);
      } else {
        overlay.classList.remove('active');
        setTimeout(() => {
          overlay.style.display = 'none';
        }, 600);
      }
    }

    // --- PREMIUM NEBULA + DEEP TWINKLE STARS + SWAYING GOLD DUST ENGINE ---
    const canvas = document.getElementById('bg-matrix-canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let radarAngle = 0;
    const stars = [];
    const dustParticles = [];
    
    // Set up deep parallax stars
    for (let i = 0; i < 75; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.85,
        size: 0.4 + Math.random() * 1.8,
        depth: 0.2 + Math.random() * 0.8, // Depth parallax multiplier
        alpha: Math.random(),
        twinkleSpeed: 0.004 + Math.random() * 0.012
      });
    }

    // Set up swaying gold leaf dust particles
    for (let i = 0; i < 35; i++) {
      dustParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: 1.0 + Math.random() * 2.5,
        depth: 0.3 + Math.random() * 0.7,
        alpha: 0.12 + Math.random() * 0.35,
        speedX: -0.05 - Math.random() * 0.15,
        speedY: 0.15 + Math.random() * 0.4, // float downwards
        phase: Math.random() * Math.PI * 2,
        swaySpeed: 0.015 + Math.random() * 0.02
      });
    }

    // Set up premium radial nebulae spots
    const nebulae = [
      {
        angle: 0,
        radiusX: canvas.width * 0.15,
        radiusY: canvas.height * 0.1,
        size: Math.max(canvas.width, canvas.height) * 0.45,
        speed: 0.0012,
        colorStart: 'rgba(212, 175, 55, 0.06)',
        colorMid: 'rgba(161, 124, 24, 0.02)'
      },
      {
        angle: Math.PI * 0.6,
        radiusX: canvas.width * 0.2,
        radiusY: canvas.height * 0.15,
        size: Math.max(canvas.width, canvas.height) * 0.38,
        speed: -0.0008,
        colorStart: 'rgba(139, 69, 19, 0.05)',
        colorMid: 'rgba(20, 10, 5, 0.01)'
      },
      {
        angle: Math.PI * 1.3,
        radiusX: canvas.width * 0.1,
        radiusY: canvas.height * 0.2,
        size: Math.max(canvas.width, canvas.height) * 0.5,
        speed: 0.0006,
        colorStart: 'rgba(212, 175, 55, 0.04)',
        colorMid: 'rgba(10, 8, 5, 0.01)'
      }
    ];

    function drawMatrix() {
      // Clear screen with basic dark overlay
      ctx.fillStyle = 'rgba(3, 2, 2, 0.16)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw slow rotating luxury nebulae spots
      nebulae.forEach(neb => {
        neb.angle += neb.speed;
        let x = canvas.width / 2 + Math.cos(neb.angle) * neb.radiusX;
        let y = canvas.height / 2 + Math.sin(neb.angle) * neb.radiusY;
        
        let grad = ctx.createRadialGradient(x, y, 0, x, y, neb.size);
        grad.addColorStop(0, neb.colorStart);
        grad.addColorStop(0.5, neb.colorMid);
        grad.addColorStop(1, 'rgba(3, 2, 2, 0)');
        
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      });

      // Update camera drift for parallax stars
      let driftX = Math.sin(Date.now() * 0.00008) * 40;
      let driftY = Math.cos(Date.now() * 0.00012) * 18;

      // Draw deep stars
      stars.forEach(star => {
        star.alpha += star.twinkleSpeed;
        if (star.alpha > 1 || star.alpha < 0) {
          star.twinkleSpeed = -star.twinkleSpeed;
        }
        
        // Parallax depth offset
        let sx = star.x + driftX * star.depth;
        let sy = star.y + driftY * star.depth;
        
        // Wrap coordinates
        if (sx < 0) sx += canvas.width;
        if (sx > canvas.width) sx -= canvas.width;
        if (sy < 0) sy += canvas.height;
        if (sy > canvas.height) sy -= canvas.height;

        ctx.fillStyle = `rgba(255, 215, 0, ${Math.max(0, star.alpha)})`;
        ctx.beginPath();
        ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
        ctx.fill();
      });

      // Draw swaying gold leaf particles
      dustParticles.forEach(p => {
        p.y += p.speedY;
        p.phase += p.swaySpeed;
        
        // Sway sideways
        let px = p.x + Math.sin(p.phase) * 14;
        let py = p.y;
        
        // Wrap coordinates
        if (p.y > canvas.height + 10) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
        if (p.x < -15) p.x = canvas.width + 15;
        if (p.x > canvas.width + 15) p.x = -15;

        ctx.fillStyle = `rgba(212, 175, 55, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fill();
      });

      // Draw radar sweep in Round 5 or Round 6 if needed
      if (currentRound === 5 || currentRound === 6) {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const maxRadius = Math.min(canvas.width, canvas.height) * 0.38;

        ctx.strokeStyle = 'rgba(212, 175, 55, 0.12)';
        ctx.lineWidth = 1;
        for (let r = 0; r < 4; r++) {
          ctx.beginPath();
          ctx.arc(centerX, centerY, maxRadius * (r + 1) / 4, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Draw rotating radar scan line
        ctx.strokeStyle = 'rgba(212, 175, 55, 0.35)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(radarAngle) * maxRadius, centerY + Math.sin(radarAngle) * maxRadius);
        ctx.stroke();

        radarAngle += 0.015;
      }
    }

    setInterval(drawMatrix, 45);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      // Update nebulae radiuses on resize
      nebulae[0].radiusX = canvas.width * 0.15;
      nebulae[0].radiusY = canvas.height * 0.1;
      nebulae[0].size = Math.max(canvas.width, canvas.height) * 0.45;
      
      nebulae[1].radiusX = canvas.width * 0.2;
      nebulae[1].radiusY = canvas.height * 0.15;
      nebulae[1].size = Math.max(canvas.width, canvas.height) * 0.38;
      
      nebulae[2].radiusX = canvas.width * 0.1;
      nebulae[2].radiusY = canvas.height * 0.2;
      nebulae[2].size = Math.max(canvas.width, canvas.height) * 0.5;
    });
  </script>
</body>
</html>
